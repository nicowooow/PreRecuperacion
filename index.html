<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ejercicio PHP</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/libros.js"></script>
    <script defer src="js/session.js"></script>
</head>
<body>
<h1>¡Bienvenido al ejercicio de práctica de php!</h1>
<div id="session">
    <form method="post" id="login">
        <h3>Iniciar sesión</h3>
        <!--            nombre de usuario-->
        <label for="usuario-l">usuario : </label>
        <input type="text" name="usuario" id="usuario-l"> <br><br>
        <!--            contraseña de usuario-->
        <label for="contrasena-l">contraseña : </label>
        <input type="password" name="contrasena" id="contrasena-l"><br><br>
        <input type="submit" value="iniciar sesión">
    </form>
    <p class="message-p"></p>
</div>
<div id="content" hidden="hidden"> <!---->
    <div>
        <h2>Bienvenido, <span class="username"></span></h2>
    </div>
    <section class="content-user">
        <div>
            <button type="button" id="logout">cerrar sesión</button>
        </div>
        <div>
            <h3>buscar libro</h3>
            <form method="get" id="libro-busqueda">
                <label for="titulo-lb">titulo : </label>
                <input type="search" name="titulo" id="titulo-lb">

                <label for="precio-lb">precio máximo : </label>
                <input type="number" name="precio" id="precio-lb" value="0">

                <input type="submit" value="buscar">
            </form>
            <br>
            <table class="lista-libros"></table>
        </div>
    </section>
    <section id="content-admin" hidden="hidden">
        <div style="display: grid; grid-template-columns: repeat(3,1fr);">
            <section>
                <form method="post" id="register">
                    <h3>Registrar usuario nuevo</h3>
                    <!--            nombre de usuario-->
                    <label for="usuario-r">usuario : </label>
                    <input type="text" name="usuario" id="usuario-r"><br><br>
                    <!--            contraseña de usuario-->
                    <label for="contrasena-r">contraseña : </label>
                    <input type="text" name="contrasena" id="contrasena-r"><br><br>
                    <!--            rol de usuario-->
                    <b style="display: inline-block">rol : </b>
                    <label for="admin">admin</label>
                    <input type="radio" name="role" id="admin" value=2>

                    <label for="user">usuario</label>
                    <input type="radio" name="role" id="user" value=1 checked><br><br>

                    <input type="submit" value="registrar">
                </form>
                <p class="message-r"></p>
            </section>
            <section>
                <form method="post" id="cambiar-precio">
                    <h3>Cambiar precio</h3>
                    <label for="name-l">titulo completo o isbn : </label>
                    <input type="text" name="nombre-isbn" id="name-l"><br><br>

                    <label for="precio-l">precio nuevo : </label>
                    <input type="number" name="precio" id="precio-l"><br><br>

                    <input type="submit" value="cambiar">
                </form>
                <p class="message-cp"></p>
            </section>
        </div>

    </section>
</div>
</body>
</html>
