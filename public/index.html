<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ejercicio PHP</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/session.js"></script>
</head>
<body>
<h1>¡Bienvenido al ejercicio de práctica de php!</h1>
<div id="session">
    <form method="post" id="login">
        <h2>Iniciar sesión</h2>
        <!--            nombre de usuario-->
        <label for="usuario-l">usuario : </label>
        <input type="text" name="usuario-l" id="usuario-l"> <br><br>
        <!--            contraseña de usuario-->
        <label for="contrasena-l">contraseña : </label>
        <input type="text" name="contrasena-l" id="contrasena-l"><br><br>
        <input type="submit" value="iniciar sesión">
    </form>
    <p class="message-p"></p>
</div>
<div id="content" hidden="hidden"> <!--  -->
    <div>
        <form method="post" id="register">
            <h2>Registrar usuario nuevo</h2>
            <!--            nombre de usuario-->
            <label for="usuario-r">usuario : </label>
            <input type="text" name="usuario-r" id="usuario-r"><br><br>
            <!--            contraseña de usuario-->
            <label for="contrasena-r">contraseña : </label>
            <input type="text" name="contrasena-r" id="contrasena-r"><br><br>
            <!--            rol de usuario-->
            <b style="display: inline-block">rol : </b>
            <label for="admin">admin</label>
            <input type="radio" name="role-r" id="admin" value=2>

            <label for="user">usuario</label>
            <input type="radio" name="role-r" id="user" value=1 checked><br><br>

            <input type="submit" value="registrarse">
        </form>
        <p class="message-r"></p>
    </div>
</div>
</body>
</html>
