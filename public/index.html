<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ejercicio PHP</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/session.js"></script>
</head>
<body>
<h1>¡Bienvenido al ejercicio de práctica de php!</h1>
<div id="session">
    <form method="post" id="login">
        <h2>Iniciar sesión</h2>
        <label for="usuario-l">usuario : </label>

        <p class="message-p"></p>
    </form>
</div>
<div id="content" hidden="hidden">
    <div>
    <form method="post" id="register">
        <h2>Registrar usuario nuevo</h2>
        <label for="usuario-r">usuario : </label>
        <input type="text" name="usuario-r" id="usuario-r">
        <label for="contrasena-r">contraseña : </label>
        <input type="text" name="contrasena-r" id="contrasena-r">
        <input type="submit" value="registrarse">
    </form>
        <p class="message-r"></p>
    </div>
</div>
